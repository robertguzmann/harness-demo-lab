pipeline:
  name: Harness DemoLab CI
  identifier: Harness_DemoLab_CI
  projectIdentifier: DemoLab
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: GitHub_DemoLab_Repository
        repoName: harness-demo-lab
        build: <+input>
  stages:
    - stage:
        name: Build and Push Image
        identifier: Build_and_Push_Image
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: true
          buildIntelligence:
            enabled: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: Kubernetes_DemoLab
              namespace: demo-lab
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Install Dependencies
                  identifier: Install_Dependencies
                  spec:
                    connectorRef: DockerHub_DemoLab
                    image: node:20-alpine
                    shell: Sh
                    command: npm ci
              - step:
                  type: Run
                  name: Run Tests
                  identifier: Run_Tests
                  spec:
                    connectorRef: DockerHub_DemoLab
                    image: node:20-alpine
                    shell: Sh
                    command: npm test
              - step:
                  type: BuildAndPushDockerRegistry
                  name: Build and Push Docker Image
                  identifier: Build_and_Push_Docker_Image
                  spec:
                    connectorRef: DockerHub_DemoLab
                    repo: robertgusmann/harness-demo-lab
                    tags:
                      - latest
                      - <+pipeline.sequenceId>
                    dockerfile: Dockerfile
                    context: .
