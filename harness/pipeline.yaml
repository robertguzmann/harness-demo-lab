# Sanitized Harness pipeline reference
#
# This file documents the Harness CI/CD workflow used for the assessment.
# It does not contain secrets, tokens, account IDs, delegate tokens, or connector credentials.

pipeline:
  name: Harness DemoLab CI
  identifier: Harness_DemoLab_CI
  projectIdentifier: DemoLab
  orgIdentifier: default
  properties:
    ci:
      codebase:
        connectorRef: GitHub_DemoLab_Repository
        repoName: harness-demo-lab
        build:
          type: branch
          spec:
            branch: main
  stages:
    - stage:
        name: Build and Push Image
        identifier: Build_and_Push_Image
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: true
          buildIntelligence:
            enabled: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: Kubernetes_DemoLab
              namespace: demo-lab
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Install Dependencies
                  identifier: Install_Dependencies
                  spec:
                    connectorRef: DockerHub_DemoLab
                    image: node:20-alpine
                    shell: Sh
                    command: npm ci
              - step:
                  type: Run
                  name: Run Tests
                  identifier: Run_Tests
                  spec:
                    connectorRef: DockerHub_DemoLab
                    image: node:20-alpine
                    shell: Sh
                    command: npm test
              - step:
                  type: BuildAndPushDockerRegistry
                  name: Build and Push Docker Image
                  identifier: Build_and_Push_Docker_Image
                  spec:
                    connectorRef: DockerHub_DemoLab
                    repo: robertgusmann/harness-demo-lab
                    tags:
                      - latest
                      - <+pipeline.sequenceId>
                    dockerfile: Dockerfile
                    context: .
    - stage:
        name: Deploy to Kubernetes
        identifier: Deploy_to_Kubernetes
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: harness_demo_lab
            serviceInputs:
              manifests:
                - manifest:
                    identifier: k8s_manifests
                    type: K8sManifest
                    spec:
                      store:
                        type: Github
                        spec:
                          connectorRef: GitHub_DemoLab_Repository
                          repoName: harness-demo-lab
                          branch: main
                          paths:
                            - k8s/
          environment:
            environmentRef: dev
            infrastructureDefinitions:
              - identifier: minikube_demo_lab
                inputs:
                  namespace: demo-lab
                  connectorRef: Kubernetes_DemoLab
          execution:
            strategy:
              type: Canary
              spec:
                canary:
                  instanceCount: 1
                primary:
                  type: Rolling
